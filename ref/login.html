    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9f9ff;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
            vertical-align: middle;
        }
        .login-card {
            box-shadow: 0px 4px 12px rgba(0,0,0,0.05);
            border: 1px solid #E5E7EB;
        }
        .input-focus-ring:focus {
            outline: none;

<body class="bg-surface min-h-screen flex items-center justify-center p-margin-mobile md:p-0">
<!-- Login Container -->
<main class="w-full max-w-[440px] animate-in fade-in duration-700 slide-in-from-bottom-4">
    <!-- Branding Header (Suppressed Nav Shell as per instructions for Transactional pages) -->
    <div class="text-center mb-stack-lg pt-20">
        <div class="inline-flex items-center justify-center w-16 h-16 rounded-xl bg-primary-container text-on-primary mb-stack-md shadow-sm">
            <span class="material-symbols-outlined text-[32px]">edit_note</span>
        </div>
        <h1 class="font-display-lg text-display-lg text-on-surface">Wide Web Blog</h1>
        <p class="font-body-md text-body-md text-secondary mt-1">CMS Administrator Portal</p>
    </div>
    <!-- Login Card -->
    <div class="login-card bg-surface-container-lowest p-margin-desktop rounded-xl">
        <form action="#" class="space-y-stack-lg" method="POST">
            <!-- Email Field -->
            <div class="space-y-stack-sm">
                <label class="font-label-md text-label-md text-on-surface" for="email">Email Address</label>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">mail</span>
                    <input class="w-full pl-10 pr-4 py-3 bg-white border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface input-focus-ring transition-all" id="email" name="email" placeholder="admin@widewebblog.com" required="" type="email">
                </div>
            </div>
            <!-- Password Field -->
            <div class="space-y-stack-sm">
                <div class="flex justify-between items-center">
                    <label class="font-label-md text-label-md text-on-surface" for="password">Password</label>
                    <a class="font-label-sm text-label-sm text-primary hover:underline transition-colors" href="#">Forgot password?</a>
                </div>
                <div class="relative">
                    <span class="material-symbols-outlined absolute left-3 top-1/2 -translate-y-1/2 text-outline text-[20px]">lock</span>
                    <input class="w-full pl-10 pr-12 py-3 bg-white border border-outline-variant rounded-lg font-body-md text-body-md text-on-surface input-focus-ring transition-all" id="password" name="password" placeholder="••••••••" required="" type="password">
                    <button class="absolute right-3 top-1/2 -translate-y-1/2 text-secondary hover:text-on-surface transition-colors" id="togglePassword" type="button">
                        <span class="material-symbols-outlined text-[20px]">visibility</span>
                    </button>
                </div>
            </div>
            <!-- Remember Me -->
            <div class="flex items-center">
                <input class="w-4 h-4 text-primary border-outline-variant rounded focus:ring-primary-container cursor-pointer" id="remember" name="remember" type="checkbox">
                <label class="ml-2 font-label-md text-label-md text-secondary cursor-pointer select-none" for="remember">Remember this device</label>
            </div>
            <!-- Sign In Button -->
            <button class="w-full bg-primary-container hover:bg-primary text-on-primary font-label-md text-label-md py-4 rounded-lg shadow-sm hover:shadow-md active:scale-[0.98] transition-all flex items-center justify-center gap-2" type="submit">
                Sign In
                <span class="material-symbols-outlined text-[18px]">login</span>
            </button>
        </form>
        <!-- Footer Action -->
        <div class="mt-stack-lg pt-stack-lg border-t border-outline-variant text-center">
            <p class="font-body-sm text-body-sm text-secondary">
                Not an administrator? <a class="text-primary font-medium hover:underline" href="#">Contact Support</a>
            </p>
        </div>
    </div>
    <!-- System Status / Atmospheric Footer -->
    <div class="mt-stack-lg flex justify-center gap-stack-md text-secondary">
        <div class="flex items-center gap-1 font-label-sm text-label-sm">
            <span class="w-2 h-2 rounded-full bg-green-500"></span>
            Systems Operational
        </div>
        <span class="text-outline-variant">|</span>
        <div class="font-label-sm text-label-sm">v2.4.1 Build</div>
    </div>
</main>
<!-- Subtle Background Detail Image -->
<div class="fixed bottom-0 right-0 w-1/3 h-1/2 opacity-10 pointer-events-none -z-10 overflow-hidden">
    <img class="w-full h-full object-cover grayscale" data-alt="A sophisticated close-up photograph of a modern, minimalist workspace featuring high-end editorial magazines and a clean digital tablet. The scene is bathed in soft, diffused morning sunlight, creating a professional and calm atmosphere. The color palette consists of neutral greys, soft whites, and a single vibrant orange accent from a designer pen. The overall aesthetic is professional, scholarly, and focused on high-quality content production." src="https://lh3.googleusercontent.com/aida-public/AB6AXuDzpaiqSril-tzd4BL58yk2v_Lr_uZGJQ87CttnHcuRRhqxFmJmICStRJST3XksKSmCUShmhaKnxRkZGxzx-HdJBSY6UGmLAwrPJVWZ0ZOOOwu5wUoqz5xsoWAx2CC3Tayqs3BhX5trQe490VJPV8nwOQQz5NWWevf-AawmHL1-j4zgdaLVVP7fF_cwINXMg2d3I1SxHp5Ptk7T_rmDsUgrxbUjcLrYvPYlWZS_azo0BBPv3KU_fZ29QJEdNjj37NELSaA4cWjaXSyh">
</div>
<script>
    // Micro-interaction for password toggle
    const toggleBtn = document.getElementById('togglePassword');
    const passwordInput = document.getElementById('password');

    toggleBtn.addEventListener('click', () => {
        const isPassword = passwordInput.type === 'password';
        passwordInput.type = isPassword ? 'text' : 'password';
        toggleBtn.querySelector('span').innerText = isPassword ? 'visibility_off' : 'visibility';
    });

    // Form submission animation simulation
    const form = document.querySelector('form');
    form.addEventListener('submit', (e) => {
        e.preventDefault();
        const btn = form.querySelector('button[type="submit"]');
        btn.innerHTML = '<span class="material-symbols-outlined animate-spin">refresh</span> Authenticating...';
        btn.disabled = true;
        btn.classList.add('opacity-80', 'cursor-not-allowed');

        // Artificial delay to show "loading" state
        setTimeout(() => {
            window.location.reload(); // Redirect logic would go here
        }, 1200);
    });
</script>


</body></html>
